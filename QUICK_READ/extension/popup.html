<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="extension_name">Summarize and Translate with Gemini</title>
    <link rel="stylesheet" href="css/new.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 1rem;
            background-color: #0b0d10; /* Dark background */
            color: #e0e0e0; /* Light text for contrast */
            overflow: hidden;
            border-radius: 10px;
            scrollbar-width: none;
        }

        header {
            background: linear-gradient(180deg,#232b37, #0b0d10);          
            display: flex;
            align-items: center;     
            max-height: 60px;
        }

        h1 {
            font-family: "Dancing Script", serif;
            display: flex;
            font-size: 2.2em;
            align-items: center;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.528);
        }



        img {
            margin-right: 1rem;
            margin-top: 1em;
        }

        #content {
            background: rgba(255, 255, 255, 0.1); /* Semi-transparent background */
            padding: 1.5rem; /* Increased padding */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1); /* Subtle shadow */
            margin-bottom: 2rem;
            max-height: 250px;
            overflow-y: auto;
            scrollbar-width: none;
            text-align: left;
            color: #e0f2fe; /* Soft bluish white */
            font-family: "Poppins", sans-serif; /* Different font */
            font-size: 0.9rem; /* Adjusted font size */
            line-height: 1.6; /* Improved line height */
            letter-spacing: 0.5px; /* Slight letter spacing */

            /* Glassy effect */
            backdrop-filter: blur(10px); /* Blur effect */
            -webkit-backdrop-filter: blur(10px); /* Safari support */
            background-color: rgba(255, 255, 255, 0.1); /* Semi-transparent background */
            border: 1px solid rgba(255, 255, 255, 0.2); /* Light border */

            /* Shiny border animation */
            position: relative;
            overflow-x: hidden;
            
        }

        #content::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: .5px; /* Thickness of the shiny border */
            background: linear-gradient(
                90deg,
                transparent,
                rgba(144, 174, 250, 0.831),
                transparent
            );
            animation: shine 3s linear infinite;
        }

@keyframes shine {
    0% {
        left: -100%;
    }
    100% {
        left: 100%;
    }
}
        
        button:hover {
            background: transparent;
            box-shadow: 0 2px 5px rgba(255, 255, 255, 0.25);
        }

        #status {
            color: #b0b0b0;
            margin-bottom: 1rem;
        }

        button {   
            color: white;
            padding: auto;
            border: 1px solid #a6a6a646;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 0.5rem;
            background-color: transparent;
            font-size: smaller;
        }

        body.narrow select,
        body.narrow #results {
            display: block;
        }

    </style>
</head>

<body>
    <header>
        <div style="display: flex;">
        <img src="img/icon-128.png" alt="" width="64" height="64">
        <div style="display: flex; flex-direction: column; justify-content: center;">
        <h1>QuickRead</h1>
        <h6 style=" font-weight: 100; font-size: 13px; margin-top: -1em; margin-left:1px;">Summarize with Gemini</h6>
        </div>
        </div>
        
    </header>


    <p id="content" dir="auto"></p>
    <p id="status"></p>
    <div style="display: flex; justify-content: center; margin-top: 1rem;">
    <div>
        <button id="copy" data-i18n="popup_button_copy">Copy</button>
    </div>

    <div>
        <button id="run" data-i18n="popup_button_run">Summarize</button>
        
    </div>

    <div>
        <button id="options" data-i18n="popup_button_options">Open options page</button>
    </div>

    <div>
        <span id="languageModelContainer"></span>
    </div>

    </div>
    <script src="lib/marked.umd.min.js"></script>
    <script src="lib/purify.min.js"></script>
    <script type="module" src="popup.js"></script>
</body>

</html>
